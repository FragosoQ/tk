<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16213A">
<title>Tóquio · 30 Ago – 6 Set</title>
<style>
:root{
  --ink:#16213A;        /* indigo escuro — texto/primário */
  --indigo:#2E4A78;     /* indigo médio */
  --shu:#DB4F36;        /* vermelhão (torii) — acento */
  --shu-soft:#fbe7e2;
  --teal:#2F7E8C;       /* transportes */
  --gold:#B8860B;
  --paper:#F2F1EC;      /* fundo papel (frio, não creme) */
  --card:#FBFAF6;
  --line:#E2DFD6;
  --muted:#6C7385;
  --ok:#2E8B6F;
  --shadow:0 1px 2px rgba(22,33,58,.06),0 6px 22px rgba(22,33,58,.07);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:600px;margin:0 auto;padding:0 14px 60px}

/* ---------- HEADER ---------- */
header.top{
  padding:30px 0 16px;position:relative;
}
.eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--shu);font-weight:700;margin:0 0 6px}
.brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand .kanji{font-size:52px;font-weight:800;line-height:.9;color:var(--ink);letter-spacing:.04em}
.brand .latin{font-size:30px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
.brand .latin small{display:block;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--muted);margin-top:4px}
.brand .latin small b{color:var(--indigo);font-weight:700}

/* ---------- TABS ---------- */
.tabs{display:flex;gap:6px;margin:18px 0 4px;position:sticky;top:0;z-index:30;
  background:linear-gradient(var(--paper) 70%,rgba(242,241,236,0));padding:8px 0 10px}
.tab{flex:1;border:none;background:#e8e6df;color:var(--indigo);font-weight:700;font-size:13.5px;
  padding:10px 6px;border-radius:11px;cursor:pointer;transition:.15s}
.tab[aria-selected="true"]{background:var(--ink);color:#fff}
.tab:focus-visible{outline:3px solid var(--shu);outline-offset:2px}

/* ---------- DAY NAV PILLS ---------- */
.daynav{display:flex;gap:7px;overflow-x:auto;padding:6px 2px 12px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
.daynav::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:12px;
  padding:7px 11px;cursor:pointer;text-align:center;min-width:54px;transition:.15s}
.pill:focus-visible{outline:3px solid var(--shu);outline-offset:2px}
.pill .pk{font-size:18px;font-weight:800;color:var(--indigo);line-height:1}
.pill .pd{font-size:10px;color:var(--muted);font-weight:600;margin-top:3px}
.pill.active{border-color:var(--ink);background:var(--ink)}
.pill.active .pk{color:#fff}.pill.active .pd{color:#cfd6e6}
.pill.trip .pk{color:var(--shu)}
.pill.trip.active{background:var(--shu);border-color:var(--shu)}
.pill.trip.active .pk{color:#fff}

/* ---------- DAY SECTION ---------- */
.day{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);margin:0 0 14px;overflow:hidden;scroll-margin-top:120px}
.day.istoday{border-color:var(--shu);box-shadow:0 0 0 2px var(--shu-soft),var(--shadow)}
.dayhead{display:flex;align-items:center;gap:14px;width:100%;border:none;background:none;
  text-align:left;padding:16px 16px;cursor:pointer;color:var(--ink)}
.dayhead:focus-visible{outline:3px solid var(--shu);outline-offset:-3px}
.daynum{flex:0 0 auto;width:50px;height:50px;border-radius:13px;background:var(--ink);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.day.trip .daynum{background:var(--shu)}
.daynum .k{font-size:24px;font-weight:800;line-height:1}
.daynum .n{font-size:9px;letter-spacing:.1em;opacity:.7;margin-top:1px}
.daymeta{flex:1;min-width:0}
.daymeta .dt{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.daymeta .th{font-size:17px;font-weight:800;margin:1px 0 0;line-height:1.25}
.tripbadge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;color:#fff;
  background:var(--shu);padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:1px;text-transform:uppercase}
.chev{flex:0 0 auto;color:var(--muted);transition:transform .2s}
.day.open .chev{transform:rotate(180deg)}
.daybody{display:none;padding:0 16px 18px}
.day.open .daybody{display:block}
.why{font-size:14px;color:var(--indigo);background:#eef1f7;border-left:3px solid var(--indigo);
  padding:10px 12px;border-radius:0 10px 10px 0;margin:2px 0 16px}

/* pass / transport banner for day trips */
.passcard{background:linear-gradient(135deg,#fff,#fdeee9);border:1.5px solid var(--shu);
  border-radius:13px;padding:13px 14px;margin:0 0 16px}
.passcard h4{margin:0 0 4px;font-size:14px;color:var(--shu);letter-spacing:.02em}
.passcard p{margin:0 0 8px;font-size:13px;color:var(--ink)}
.passcard .price{font-weight:800}
.passcard a.bbtn{display:inline-block;background:var(--shu);color:#fff;text-decoration:none;
  font-size:12px;font-weight:700;padding:7px 12px;border-radius:9px}

/* ---------- TIMELINE / STOPS ---------- */
.timeline{position:relative;margin:0;padding:0;list-style:none}
.transit{display:flex;align-items:center;gap:8px;color:var(--teal);font-size:12.5px;font-weight:600;
  padding:7px 0 7px 4px;margin-left:8px;border-left:2px dashed #c9d6da}
.transit .ico{flex:0 0 auto}
.stop{position:relative;background:#fff;border:1px solid var(--line);border-radius:13px;
  padding:12px 13px 12px;margin:0 0 4px}
.stop .toprow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.time{font-size:12px;font-weight:800;color:var(--ink);background:#edeaf0;border-radius:7px;padding:3px 8px}
.tag{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:7px}
.tag.comida{background:#fbe7e2;color:#b23a24}
.tag.historia{background:#e5ebf6;color:#2E4A78}
.tag.vista{background:#dff0ee;color:#1f6b5c}
.tag.anime{background:#ece4f6;color:#6a3fa0}
.tag.compras{background:#f6efda;color:#8a6a08}
.tag.arte{background:#fbe4f0;color:#a8347a}
.tag.logistica{background:#e8e9ed;color:#525a6b}
.stop h5{margin:2px 0 3px;font-size:15.5px;font-weight:800;line-height:1.25}
.stop h5 .jp{font-weight:600;color:var(--muted);font-size:12px;margin-left:5px}
.stop p.d{margin:0 0 8px;font-size:13.5px;color:#39415a}
.stop .dica{font-size:12.5px;color:var(--ink);background:#fffaf2;border:1px dashed #e8d9b8;
  border-radius:9px;padding:7px 9px;margin:0 0 10px}
.stop .dica b{color:var(--gold)}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mapbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:var(--ink);
  color:#fff;font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:10px}
.mapbtn:active{transform:translateY(1px)}
.chk{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);
  font-weight:600;cursor:pointer;user-select:none;margin-left:auto}
.chk input{width:18px;height:18px;accent-color:var(--ok)}
.stop.done{opacity:.62}
.stop.done h5{text-decoration:line-through;text-decoration-color:var(--muted)}

/* eat block */
.eat{margin:14px 0 2px}
.eat h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--shu);margin:0 0 8px}
.eat ul{list-style:none;margin:0;padding:0;display:grid;gap:7px}
.eat li{display:flex;gap:9px;align-items:flex-start;background:#fff;border:1px solid var(--line);
  border-radius:11px;padding:9px 11px}
.eat li .en{font-weight:700;font-size:13.5px}
.eat li .enote{font-size:12px;color:var(--muted)}
.eat li a{margin-left:auto;flex:0 0 auto;color:var(--ink);text-decoration:none;font-size:18px;
  align-self:center;line-height:1}

/* notes list */
.notes{margin:14px 0 0;padding:0;list-style:none}
.notes li{font-size:12.5px;color:#39415a;padding:5px 0 5px 20px;position:relative}
.notes li::before{content:"▸";position:absolute;left:2px;color:var(--shu);font-size:11px;top:6px}

/* ---------- ESSENCIAIS ---------- */
.panel{display:none}
.panel.show{display:block}
.acard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px;margin:0 0 14px}
.acard > h3{margin:0 0 12px;font-size:17px;display:flex;align-items:center;gap:9px}
.acard > h3 .dot{width:9px;height:9px;border-radius:50%;background:var(--shu);flex:0 0 auto}
.app{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
.app:first-of-type{border-top:none}
.app .ai{flex:0 0 auto;width:38px;height:38px;border-radius:10px;background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.app .ai.p{background:var(--shu)}.app .ai.t{background:var(--teal)}.app .ai.g{background:var(--gold)}
.app .info{flex:1;min-width:0}
.app .info .nm{font-weight:800;font-size:14.5px}
.app .info .nm .role{font-weight:600;color:var(--muted);font-size:12px}
.app .info .ds{font-size:12.5px;color:#39415a;margin-top:2px}
.app a.go{flex:0 0 auto;align-self:center;text-decoration:none;background:#e8e6df;color:var(--indigo);
  font-size:12px;font-weight:700;padding:7px 11px;border-radius:9px}
.tipgrid h4{font-size:13.5px;margin:14px 0 6px;color:var(--indigo)}
.tipgrid h4:first-child{margin-top:0}
.tipgrid ul{margin:0 0 4px;padding-left:18px}
.tipgrid li{font-size:13px;color:#39415a;margin-bottom:5px}
.tipgrid li b{color:var(--ink)}
.emerg{background:#fff4f2;border:1px solid var(--shu);border-radius:11px;padding:11px 13px;margin-top:10px}
.emerg b{color:var(--shu)}

/* ---------- ACHADOS ---------- */
.intro{font-size:13px;color:var(--indigo);background:#eef1f7;border-left:3px solid var(--indigo);
  padding:10px 12px;border-radius:0 10px 10px 0;margin:0 0 14px}
.finds{display:grid;gap:8px}
.find{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.find .fh{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.find .fn{font-weight:800;font-size:14px;line-height:1.25}
.find .fn .jp{font-weight:600;color:var(--muted);font-size:11.5px;margin-left:4px}
.find .area{margin-left:auto;font-size:10px;font-weight:700;color:var(--indigo);background:#eef1f7;
  padding:2px 7px;border-radius:6px;white-space:nowrap}
.find .fd{font-size:12.5px;color:#39415a;margin:5px 0 0}
.find .ftip{font-size:11.5px;color:#39415a;background:#fffaf2;border:1px dashed #e8d9b8;
  border-radius:8px;padding:5px 8px;margin-top:6px}
.find .ftip b{color:var(--gold)}
.find .ffoot{display:flex;align-items:center;gap:8px;margin-top:7px}
.find .fday{font-size:10px;font-weight:800;color:var(--shu);background:var(--shu-soft);
  padding:2px 7px;border-radius:6px}
.find a.fpin{margin-left:auto;color:#fff;background:var(--ink);text-decoration:none;font-size:11.5px;
  font-weight:700;padding:6px 10px;border-radius:9px}
.acard.cat{padding:0;overflow:hidden}
.cathead{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;text-align:left;
  padding:15px 16px;cursor:pointer;color:var(--ink);font:inherit}
.cathead:focus-visible{outline:3px solid var(--shu);outline-offset:-3px}
.cathead .dot{width:9px;height:9px;border-radius:50%;background:var(--shu);flex:0 0 auto}
.cathead .cattitle{font-size:16px;font-weight:800;flex:1;min-width:0;line-height:1.2}
.cathead .catcount{font-size:11px;font-weight:800;color:var(--indigo);background:#eef1f7;border-radius:20px;
  padding:2px 9px;flex:0 0 auto}
.cathead .chev{flex:0 0 auto;color:var(--muted);transition:transform .2s}
.acard.cat.open .chev{transform:rotate(180deg)}
.catbody{display:none;padding:0 16px 16px}
.acard.cat.open .catbody{display:block}

footer{text-align:center;color:var(--muted);font-size:11.5px;padding:24px 10px 10px;line-height:1.7}

@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <p class="eyebrow">Roteiro de viagem · 7 dias</p>
    <div class="brand">
      <span class="kanji">東京</span>
      <span class="latin">Tóquio
        <small>30 Ago – 6 Set <b>2026</b> · Hakone + Kamakura</small>
      </span>
    </div>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" id="tab-roteiro" role="tab" aria-selected="true" onclick="showTab('roteiro')">Roteiro</button>
    <button class="tab" id="tab-achados" role="tab" aria-selected="false" onclick="showTab('achados')">Achados</button>
    <button class="tab" id="tab-essenciais" role="tab" aria-selected="false" onclick="showTab('essenciais')">Essenciais</button>
  </div>

  <!-- ROTEIRO -->
  <div class="panel show" id="panel-roteiro">
    <nav class="daynav" id="daynav" aria-label="Dias"></nav>
    <div id="days"></div>
  </div>

  <!-- ACHADOS -->
  <div class="panel" id="panel-achados"></div>

  <!-- ESSENCIAIS -->
  <div class="panel" id="panel-essenciais"></div>

  <footer>
    Os dados podem mudar — confirma horários, preços e estado das atrações antes de cada dia.<br>
    Marca cada paragem como visitada — fica guardado neste telemóvel.
  </footer>
</div>

<script>
/* =========================================================
   DADOS DO ROTEIRO
   ========================================================= */
const TRIP_YEAR = 2026, TRIP_MONTH = 8; // Agosto

function mapsLink(q){
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
}

const DAYS = [
{
  n:1, kanji:"一", date:"30 Ago", day:30, mon:8, dow:"Domingo", trip:false,
  theme:"Chegada & Shinjuku à noite",
  why:"Dia leve para aterrar, tratar do cartão de transportes e provar a energia noturna de Shinjuku. Não exageres — o jet lag chega.",
  stops:[
    {time:"Aeroporto", tag:"logistica", name:"Cartão Suica / PASMO", jp:"IC card",
     desc:"Antes de sair do aeroporto trata do cartão de transportes — paga metro, autocarros, lojas e máquinas com um toque. iPhone: adiciona Suica à Apple Wallet ou usa a app Welcome Suica Mobile (válida 180 dias). Android comprado fora do Japão geralmente não suporta — compra o Welcome Suica físico no balcão JR do aeroporto.",
     dica:"Carrega ¥3.000–5.000 para começar. Recarregas em qualquer máquina de metro ou loja de conveniência (7-Eleven/Lawson/FamilyMart), só com dinheiro.",

    {time:"Tarde", tag:"logistica", name:"Check-in & descanso", jp:"",

    {time:"18:00", tag:"vista", name:"Tokyo Metropolitan Gov. Building", jp:"都庁",
     desc:"Miradouro a 202 m de altura, totalmente grátis. Vê o pôr do sol e as luzes da cidade — em dias limpos avista-se o Monte Fuji ao longe.",

    {time:"19:30", tag:"comida", name:"Omoide Yokocho", jp:"思い出横丁",

     q:"Omoide Yokocho Shinjuku"},
    {time:"21:00", tag:"vista", name:"Kabukicho & Godzilla", jp:"歌舞伎町",
     desc:"Mar de néon, ecrãs gigantes e a cabeça do Godzilla no topo do hotel Gracery. Passeio noturno opcional se ainda tiveres energia.",
     dica:"Ignora quem te aborda na rua a oferecer bares — segue em frente.",
     q:"Godzilla Head Shinjuku Toho"}

  eat:[
    {name:"Omoide Yokocho", note:"Yakitori e ambiente — jantar", q:"Omoide Yokocho Shinjuku"},

},
{

  theme:"Asakusa, Skytree & Ueno",
  why:"O Tóquio antigo: templo histórico, vista do céu e mercado de rua. Começa cedo — Senso-ji enche e o calor aperta ao meio-dia.",
  stops:[
    {time:"08:30", tag:"historia", name:"Templo Senso-ji & Nakamise", jp:"浅草寺",
     desc:"O templo mais antigo de Tóquio (ano 645), com o portão Kaminarimon e a sua lanterna gigante. A rua Nakamise-dori, a caminho, está cheia de bancas de doces e lembranças.",

    {time:"10:30", tag:"vista", name:"Tokyo Skytree", jp:"東京スカイツリー",

    {time:"15:00", tag:"historia", name:"Parque & Museus de Ueno", jp:"上野公園",

  eat:[

    {name:"Innsyoutei", note:"Bento e teishoku no parque de Ueno", q:"Innsyoutei Ueno Park"}
  ]
},
{
  n:2, kanji:"二", date:"31 Ago", day:31, mon:8, dow:"Segunda", trip:false,

    {time:"13:30", tag:"anime", name:"Shibuya — Hachiko & Center Gai", jp:"渋谷",
     desc:"Estátua do cão fiel Hachiko, ruas de lojas, arcades e a energia pura de Shibuya. Almoço por aqui.",

  <li>
    ${isTransit ? `<div class="transit"><span class="ico">${transitIcon()}</span>${s.desc}</div>` : ""}
    ${isTransit ? "" : `
    <div class="stop ${isDone?'done':''}" id="${id}">
      <div class="toprow">
        <span class="time">${s.time}</span>
        <span class="tag ${s.tag}">${tagLabel}</span>
      </div>
      <h5>${s.name}${s.jp?` <span class="jp">${s.jp}</span>`:""}</h5>
      <p class="d">${s.desc}</p>
      ${s.dica?`<div class="dica"><b>Dica ·</b> ${s.dica}</div>`:""}
      <div class="actions">
        <a class="mapbtn" href="${mapsLink(s.q)}" target="_blank" rel="noopener">📍 Mapa</a>
        <label class="chk"><input type="checkbox" ${isDone?"checked":""} onchange="toggle('${id}',this.checked)"> visitado</label>
      </div>
    </div>`}
  </li>`;
}

function dayHTML(d){
  const stops = d.stops.map((s,i)=>stopHTML(d,i,s)).join("");
  const eat = d.eat ? `
    <div class="eat">
      <h4>Onde comer</h4>
      <ul>${d.eat.map(e=>`
        <li><div><div class="en">${e.name}</div><div class="enote">${e.note}</div></div>
        <a href="${mapsLink(e.q)}" target="_blank" rel="noopener" aria-label="Mapa">📍</a></li>`).join("")}
      </ul>
    </div>` : "";
  const notes = d.notes ? `<ul class="notes">${d.notes.map(n=>`<li>${n}</li>`).join("")}</ul>` : "";
  const pass = d.pass ? `
    <div class="passcard">
      <h4>${d.pass.title}</h4>
      <p>${d.pass.text}</p>
      <p class="price">${d.pass.price}</p>
      ${d.pass.extra?`<p style="font-size:12px;color:#6C7385;margin-bottom:8px">${d.pass.extra}</p>`:""}
      <a class="bbtn" href="${d.pass.link}" target="_blank" rel="noopener">Mais info</a>
    </div>` : "";
  return `
  <section class="day ${d.trip?'trip':''}" id="day${d.n}" data-day="${d.day}">
    <button class="dayhead" aria-expanded="false" onclick="toggleDay(${d.n})">
      <span class="daynum"><span class="k">${d.kanji}</span><span class="n">DIA ${d.n}</span></span>
      <span class="daymeta">
        <span class="dt">${d.date} · ${d.dow}</span>
        <span class="th">${d.theme}${d.trip?'<span class="tripbadge">excursão</span>':''}</span>
      </span>
      <span class="chev">▾</span>
    </button>
    <div class="daybody">
      <div class="why">${d.why}</div>
      ${pass}
      <ol class="timeline">${stops}</ol>
      ${eat}
      ${notes}
    </div>
  </section>`;
}

function ordered(){ return DAYS.slice().sort((a,b)=>a.n-b.n); }

function renderDays(){
  const list = ordered();
  document.getElementById("days").innerHTML = list.map(dayHTML).join("");
  // nav pills
  document.getElementById("daynav").innerHTML = list.map(d=>`
    <button class="pill ${d.trip?'trip':''}" id="pill${d.n}" onclick="goDay(${d.n})">
      <div class="pk">${d.kanji}</div><div class="pd">${d.day}/${d.mon}</div>
    </button>`).join("");
}

function renderEssenciais(){
  const apps = `
    <div class="acard">
      <h3><span class="dot"></span>Apps essenciais</h3>
      ${APPS.map(a=>`
        <div class="app">
          <div class="ai ${a.cls}">${a.ini}</div>
          <div class="info">
            <div class="nm">${a.name} <span class="role">· ${a.role}</span></div>
            <div class="ds">${a.ds}</div>
          </div>
          <a class="go" href="${a.url}" target="_blank" rel="noopener">Abrir</a>
        </div>`).join("")}
    </div>`;
  document.getElementById("panel-essenciais").innerHTML = apps + TIPS;
}

function findHTML(it){
  const pin = it.q ? `<a class="fpin" href="${mapsLink(it.q)}" target="_blank" rel="noopener">📍 Mapa</a>` : "";
  const day = it.day ? `<span class="fday">${it.day}</span>` : "";
  const tip = it.tip ? `<div class="ftip"><b>Dica ·</b> ${it.tip}</div>` : "";
  const foot = (it.day || it.q) ? `<div class="ffoot">${day}${pin}</div>` : "";
  return `
   <div class="find">
     <div class="fh">
       <span class="fn">${it.name}${it.jp?` <span class="jp">${it.jp}</span>`:""}</span>
       ${it.area?`<span class="area">${it.area}</span>`:""}
     </div>
     ${it.desc?`<div class="fd">${it.desc}</div>`:""}
     ${tip}
     ${foot}
   </div>`;
}

function renderAchados(){
  const top = `<div class="intro">Garimpo, comida-gema e coisas fora do comum. O selo a vermelho mostra em que <b>dia/zona</b> do roteiro cada sítio encaixa melhor; "Extra" são pequenos desvios que valem a pena. Toca numa categoria para abrir.</div>`;
  const sections = DISCOVER.map((sec,i)=>`
    <div class="acard cat" id="cat${i}">
      <button class="cathead" aria-expanded="false" onclick="toggleCat(${i})">
        <span class="dot"></span>
        <span class="cattitle">${sec.title}</span>
        <span class="catcount">${sec.items.length}</span>
        <span class="chev">▾</span>
      </button>
      <div class="catbody">
        ${sec.intro?`<div class="intro">${sec.intro}</div>`:""}
        <div class="finds">${sec.items.map(findHTML).join("")}</div>
      </div>
    </div>`).join("");
  document.getElementById("panel-achados").innerHTML = top + sections;
}

function toggleCat(i){
  const el = document.getElementById("cat"+i);
  const open = el.classList.toggle("open");
  el.querySelector(".cathead").setAttribute("aria-expanded", open);
}

function toggle(id, val){
  if(val) done[id]=1; else delete done[id];
  save();
  const el = document.getElementById(id);
  if(el) el.classList.toggle("done", val);
}

let openDay = null;
function toggleDay(n){
  const sec = document.getElementById("day"+n);
  const wasOpen = sec.classList.contains("open");
  if(wasOpen){
    sec.classList.remove("open");
    sec.querySelector(".dayhead").setAttribute("aria-expanded","false");
  } else {
    sec.classList.add("open");
    sec.querySelector(".dayhead").setAttribute("aria-expanded","true");
  }
  syncPills();
}
function goDay(n){
  const sec = document.getElementById("day"+n);
  if(!sec.classList.contains("open")) toggleDay(n);
  sec.scrollIntoView({behavior:"smooth", block:"start"});
  syncPills();
}
function syncPills(){
  DAYS.forEach(d=>{
    const sec = document.getElementById("day"+d.n);
    const pill = document.getElementById("pill"+d.n);
    if(pill) pill.classList.toggle("active", sec.classList.contains("open"));
  });
}

const TAB_IDS = ["roteiro","achados","essenciais"];
function showTab(which){
  TAB_IDS.forEach(t=>{
    const on = t===which;
    document.getElementById("panel-"+t).classList.toggle("show", on);
    document.getElementById("tab-"+t).setAttribute("aria-selected", on);
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

function markToday(){
  const now = new Date();
  if(now.getFullYear()!==TRIP_YEAR) return null;
  const mon = now.getMonth()+1, dd = now.getDate();
  const match = DAYS.find(d=>d.mon===mon && d.day===dd);
  if(match){
    const sec = document.getElementById("day"+match.n);
    sec.classList.add("istoday");
    return match.n;
  }
  return null;
}

// init
renderDays();
renderAchados();
renderEssenciais();
const todayN = markToday();
toggleDay(todayN || 1);
goDay(todayN || 1);
window.scrollTo({top:0});
</script>
